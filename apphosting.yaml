runtime: nodejs18
entryPoint: server.js

buildEnvironment:
  NPM_ENV: "production"

runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 10
  concurrency: 80

env:
  - variable: NODE_ENV
    value: "production"
  - variable: PORT
    value: "8080"
  - variable: MPESA_CONSUMER_KEY
    secret: mpesa_consumer_key
  - variable: MPESA_CONSUMER_SECRET
    secret: mpesa_consumer_secret
  - variable: MPESA_SHORT_CODE
    secret: mpesa_shortcode
  - variable: MPESA_PASS_KEY
    secret: mpesa_passkey
  - variable: MPESA_CALLBACK_URL
    value: "https://backend-gadgets--gadgets-83800.us-east5.hosted.app/api/mpesa/callback"
  - variable: FIREBASE_PROJECT_ID
    secret: firebase_project_id
  - variable: FIREBASE_CLIENT_EMAIL
    secret: firebase_client_email
  - variable: FIREBASE_PRIVATE_KEY
    secret: firebase_private_key
  - variable: FIREBASE_DATABASE_URL
    secret: firebase_database_url
  - variable: EMAILJS_SERVICE_ID
    secret: emailjs_service_id
  - variable: EMAILJS_TEMPLATE_ID
    secret: emailjs_template_id
  - variable: EMAILJS_USER_ID
    secret: emailjs_user_id
  - variable: EMAILJS_ACCESS_TOKEN
    secret: emailjs_access_token
  - variable: HOSTPINNACLE_SMS_API_KEY
    value: "54e02de12e0b842acf9fae5a56d74ada8192e9eb"
  - variable: HOSTPINNACLE_SENDER_ID
    value: "Crestrock"
